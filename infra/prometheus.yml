global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway-service:8000']

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['ingestion-service:8001']

  - job_name: 'stream-processor'
    static_configs:
      - targets: ['stream-processor:8081']

  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
